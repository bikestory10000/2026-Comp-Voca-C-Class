<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민쌤 압축보카 2.0 — 리뷰 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Anybody:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f1a;
    --bg-card: #161826;
    --bg-card-alt: #1a1d30;
    --border: #252840;
    --cyan: #00d2ff;
    --gold: #ffd43b;
    --coral: #ff6b6b;
    --green: #51cf66;
    --red: #ff4757;
    --text: #d4d4de;
    --text-dim: #6b6e85;
    --text-bright: #f0f0f5;
    --card-radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 2.5rem 1.5rem 1.5rem;
  }
  .header .badge {
    display: inline-block; font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--cyan);
    border: 1px solid rgba(0,210,255,0.25); padding: 0.25rem 0.9rem;
    border-radius: 99px; margin-bottom: 0.8rem;
  }
  .header h1 {
    font-family: 'Anybody', sans-serif; font-weight: 900;
    font-size: clamp(1.6rem, 5vw, 2.4rem); color: var(--text-bright);
    line-height: 1.2;
  }
  .header h1 span {
    background: linear-gradient(135deg, var(--gold), var(--coral));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .back-link {
    display: inline-block; margin-top: 1rem; color: var(--text-dim);
    font-size: 0.8rem; text-decoration: none; transition: color 0.2s;
  }
  .back-link:hover { color: var(--cyan); }

  /* ── Setup Screen ── */
  .setup { max-width: 600px; margin: 0 auto; padding: 1.5rem; }
  .setup h2 { font-size: 1.1rem; color: var(--text-bright); margin-bottom: 1rem; font-weight: 700; }
  .setup-label { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 0.5rem; font-weight: 500; }
  
  .round-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px; margin-bottom: 1.5rem;
  }
  .round-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 6px; text-align: center;
    font-size: 0.82rem; font-weight: 600; color: var(--text-dim);
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .round-btn:hover { border-color: var(--cyan); color: var(--text); }
  .round-btn.active { background: rgba(0,210,255,0.1); border-color: var(--cyan); color: var(--cyan); }
  
  .select-all-row {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .select-all-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 14px; font-size: 0.75rem; color: var(--text-dim);
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .select-all-btn:hover { border-color: var(--gold); color: var(--gold); }

  .count-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem;
  }
  .count-row label { font-size: 0.82rem; color: var(--text-dim); }
  .count-input {
    width: 70px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text-bright);
    font-size: 0.9rem; font-family: 'Anybody', sans-serif; text-align: center;
  }
  .count-max { font-size: 0.75rem; color: var(--text-dim); }

  .start-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--cyan), #0099cc);
    color: #fff; font-size: 1rem; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,210,255,0.2);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(0,210,255,0.35); }
  .start-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

  /* ── Quiz Screen ── */
  .quiz { max-width: 640px; margin: 0 auto; padding: 1rem 1.25rem 3rem; display: none; }

  .progress-bar-wrap {
    background: var(--bg-card); border-radius: 99px; height: 6px;
    margin-bottom: 1rem; overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--cyan), var(--gold));
    transition: width 0.4s ease;
  }

  .quiz-info {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem; font-size: 0.78rem; color: var(--text-dim);
  }
  .quiz-info .round-tag {
    background: rgba(255,212,59,0.1); color: var(--gold);
    padding: 3px 10px; border-radius: 99px; font-weight: 600; font-size: 0.72rem;
  }
  .score-display {
    font-family: 'Anybody', sans-serif; font-weight: 700;
  }
  .score-display .correct-num { color: var(--green); }
  .score-display .wrong-num { color: var(--red); }

  /* ── Card ── */
  .card-container {
    perspective: 1200px; -webkit-perspective: 1200px; margin-bottom: 1.5rem;
  }
  .card {
    position: relative; width: 100%; min-height: 280px;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
  }
  .card.flipped { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
  .card-front, .card-back {
    width: 100%; min-height: 280px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: var(--card-radius);
    border: 1px solid var(--border); padding: 28px 24px;
  }
  .card-front { background: var(--bg-card); position: relative; }
  .card-back {
    background: var(--bg-card-alt); transform: rotateY(180deg); -webkit-transform: rotateY(180deg);
    position: absolute; top: 0; left: 0;
  }

  .q-number {
    font-family: 'Anybody', sans-serif; font-weight: 700;
    font-size: 0.8rem; color: var(--text-dim); margin-bottom: 14px;
  }

  .sentence {
    font-size: 1.05rem; color: var(--text-bright); line-height: 1.75;
    margin-bottom: 20px; word-break: keep-all;
  }
  .sentence .underlined {
    text-decoration: underline; text-decoration-color: var(--gold);
    text-underline-offset: 4px; text-decoration-thickness: 2px;
    font-weight: 700; color: var(--gold);
  }

  .choices {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .choice-btn {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; text-align: left;
    font-size: 0.92rem; color: var(--text); cursor: pointer;
    font-family: inherit; transition: all 0.2s; display: flex;
    align-items: center; gap: 8px;
    -webkit-tap-highlight-color: rgba(0,210,255,0.15);
    touch-action: manipulation;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--cyan); background: rgba(0,210,255,0.05); }
  .choice-btn .num {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1px solid var(--border); display: flex; align-items: center;
    justify-content: center; font-size: 0.72rem; color: var(--text-dim);
    flex-shrink: 0; transition: all 0.2s;
  }
  .choice-btn:hover:not(:disabled) .num { border-color: var(--cyan); color: var(--cyan); }
  .choice-btn:disabled { cursor: default; opacity: 0.6; }
  .choice-btn.selected-correct {
    border-color: var(--green); background: rgba(81,207,102,0.1); opacity: 1;
  }
  .choice-btn.selected-correct .num {
    border-color: var(--green); color: var(--green); background: rgba(81,207,102,0.15);
  }
  .choice-btn.selected-wrong {
    border-color: var(--red); background: rgba(255,71,87,0.1); opacity: 1;
  }
  .choice-btn.selected-wrong .num {
    border-color: var(--red); color: var(--red); background: rgba(255,71,87,0.15);
  }
  .choice-btn.show-correct {
    border-color: var(--green); opacity: 1;
  }
  .choice-btn.show-correct .num {
    border-color: var(--green); color: var(--green);
  }

  /* Back side */
  .result-icon {
    font-size: 2.2rem; margin-bottom: 12px;
  }
  .result-label {
    font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;
  }
  .result-label.correct { color: var(--green); }
  .result-label.wrong { color: var(--red); }

  .back-word {
    font-size: 1.15rem; font-weight: 700; color: var(--gold);
    margin-bottom: 4px;
  }
  .back-meaning {
    font-size: 0.85rem; color: var(--text-dim); margin-bottom: 14px;
  }
  .back-answer {
    font-size: 0.88rem; color: var(--text);
    margin-bottom: 14px; line-height: 1.6;
  }
  .back-answer strong { color: var(--green); }
  .back-kor {
    font-size: 0.88rem; color: #a0a0a0; line-height: 1.65;
    border-top: 1px solid var(--border); padding-top: 14px;
  }

  .next-btn {
    width: 100%; padding: 13px; border: none; border-radius: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-bright); font-size: 0.95rem; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.2s;
    margin-top: 12px; position: relative; z-index: 10;
    -webkit-tap-highlight-color: rgba(0,210,255,0.2);
    touch-action: manipulation;
  }
  .next-btn:hover { border-color: var(--cyan); background: rgba(0,210,255,0.05); }

  /* ── Result Screen ── */
  .result-screen { max-width: 600px; margin: 0 auto; padding: 2rem 1.25rem; display: none; text-align: center; }
  .result-screen .big-score {
    font-family: 'Anybody', sans-serif; font-weight: 900;
    font-size: 4rem; margin: 1rem 0 0.5rem;
  }
  .result-screen .big-score .s-correct { color: var(--green); }
  .result-screen .big-score .s-total { color: var(--text-dim); }
  .result-screen .pct {
    font-family: 'Anybody', sans-serif; font-weight: 700;
    font-size: 1.4rem; margin-bottom: 0.5rem;
  }
  .result-screen .grade-msg {
    font-size: 0.95rem; color: var(--text-dim); margin-bottom: 2rem; line-height: 1.6;
  }

  .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .result-actions button {
    padding: 12px 24px; border-radius: 10px; font-size: 0.9rem;
    font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn-retry {
    background: linear-gradient(135deg, var(--cyan), #0099cc);
    border: none; color: #fff;
  }
  .btn-retry:hover { transform: translateY(-2px); }
  .btn-home {
    background: transparent; border: 1px solid var(--border); color: var(--text);
  }
  .btn-home:hover { border-color: var(--gold); color: var(--gold); }
  .btn-review-wrong {
    background: rgba(255,71,87,0.1); border: 1px solid var(--red); color: var(--red);
  }
  .btn-review-wrong:hover { background: rgba(255,71,87,0.2); }

  /* Wrong review list */
  .wrong-review { max-width: 640px; margin: 2rem auto 0; text-align: left; display: none; }
  .wrong-review h3 { color: var(--red); font-size: 1rem; margin-bottom: 1rem; }
  .wrong-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 10px;
  }
  .wrong-item .wi-word { color: var(--gold); font-weight: 700; font-size: 1rem; }
  .wrong-item .wi-meaning { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; }
  .wrong-item .wi-eng { color: var(--text); font-size: 0.9rem; line-height: 1.6; margin-bottom: 4px; }
  .wrong-item .wi-kor { color: #888; font-size: 0.82rem; line-height: 1.5; }
  .wrong-item .wi-answer { font-size: 0.82rem; margin-top: 6px; }
  .wrong-item .wi-answer .lbl-correct { color: var(--green); }
  .wrong-item .wi-answer .lbl-wrong { color: var(--red); text-decoration: line-through; }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 1.5rem; font-size: 0.65rem;
    color: var(--text-dim); letter-spacing: 0.04em;
  }

  /* ── Animations ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.4s ease-out both; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s ease; }

  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(81,207,102,0.4); }
    70% { box-shadow: 0 0 0 12px rgba(81,207,102,0); }
    100% { box-shadow: 0 0 0 0 rgba(81,207,102,0); }
  }

  @media (max-width: 560px) {
    .header { padding: 2rem 1rem 1rem; }
    .choices { grid-template-columns: 1fr; }
    .card-front, .card-back { padding: 22px 18px; }
    .round-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="badge">편입영어 · 리뷰 테스트</div>
  <h1>압축보카 <span>Review Test</span></h1>
  <a href="index.html" class="back-link">← 압축보카 2.0 메인으로</a>
</div>

<!-- SETUP SCREEN -->
<div class="setup" id="setupScreen">
  <h2>테스트 설정</h2>

  <div class="setup-label">회차 선택</div>
  <div class="select-all-row">
    <button class="select-all-btn" onclick="selectAllRounds()">전체 선택</button>
    <button class="select-all-btn" onclick="deselectAllRounds()">전체 해제</button>
  </div>
  <div class="round-grid" id="roundGrid"></div>

  <div class="setup-label">문제 수</div>
  <div class="count-row">
    <input type="number" class="count-input" id="countInput" value="20" min="1" max="471">
    <span class="count-max" id="countMax">/ 최대 471문제</span>
  </div>

  <button class="start-btn" id="startBtn" onclick="startQuiz()">테스트 시작</button>
</div>

<!-- QUIZ SCREEN -->
<div class="quiz" id="quizScreen">
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
  </div>
  <div class="quiz-info">
    <span class="round-tag" id="roundTag"></span>
    <span id="qCounter">1 / 20</span>
    <span class="score-display">
      <span class="correct-num" id="correctCount">0</span> ✓ &nbsp;
      <span class="wrong-num" id="wrongCount">0</span> ✗
    </span>
  </div>

  <div class="card-container">
    <div class="card" id="card">
      <div class="card-front" id="cardFront">
        <div class="q-number" id="qNumber">Q1</div>
        <div class="sentence" id="sentence"></div>
        <div class="choices" id="choices"></div>
      </div>
      <div class="card-back" id="cardBack"></div>
    </div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none">다음 문제 →</button>
</div>

<!-- RESULT SCREEN -->
<div class="result-screen" id="resultScreen">
  <div style="font-size:3rem;">🏆</div>
  <div class="big-score">
    <span class="s-correct" id="finalCorrect">0</span>
    <span class="s-total" id="finalTotal"> / 20</span>
  </div>
  <div class="pct" id="finalPct" style="color: var(--green);">100%</div>
  <div class="grade-msg" id="gradeMsg"></div>
  <div class="result-actions">
    <button class="btn-retry" onclick="retryQuiz()">다시 풀기</button>
    <button class="btn-review-wrong" id="btnReviewWrong" onclick="showWrongReview()">오답 확인</button>
    <button class="btn-home" onclick="goHome()">설정으로</button>
  </div>
  <div class="wrong-review" id="wrongReview"></div>
</div>

<div class="footer">© 민쌤영어 · 압축보카 2.0 · 리뷰 테스트</div>

 위계","eng":"The company has a rigid hierarchy, making it difficult for entry-level employees to share their ideas.","kor":"그 회사는 엄격한 위계 구조를 가지고 있어, 신입 사원들이 자신의 아이디어를 공유하기 어렵다.","correct":"ranking","distractors":["equality","flatness","uniformity"],"round":"62~60회","roundKey":"6260"},{"word":"insist","meaning":"v. 주장하다, 고집하다","eng":"The lawyer continued to insist on his client's innocence despite the mounting forensic evidence.","kor":"변호사는 늘어나는 법의학적 증거에도 불구하고 자신의 의뢰인의 무죄를 계속해서 주장했다.","correct":"demand","distractors":["concede","yield","relent"],"round":"62~60회","roundKey":"6260"},{"word":"invite","meaning":"v. 초대하다 / 자초하다(불러들이다)","eng":"The university decided to invite a prominent scientist to deliver the keynote speech at the graduation ceremony.","kor":"대학교는 졸업식에서 기조 연설을 할 저명한 과학자를 초대하기로 결정했다.","correct":"request","distractors":["dismiss","ban","exclude"],"round":"62~60회","roundKey":"6260"},{"word":"nothing but","meaning":"phr. 오직, ~에 불과한","eng":"The witness claimed that he saw nothing but a dark figure running away from the crime scene.","kor":"증인은 범죄 현장에서 달아나는 어두운 형체만을 보았을 뿐이라고 주장했다.","correct":"only","distractors":["everything except","more than","hardly"],"round":"62~60회","roundKey":"6260"},{"word":"overlook","meaning":"v. 간과하다 / 내려다보다 / 너그럽게 봐주다","eng":"Even the most experienced researchers can sometimes overlook a crucial detail in a massive data set.","kor":"아무리 숙련된 연구자라 하더라도 거대한 데이터 세트에서 결정적인 세부 사항을 가끔 간과할 수 있다.","correct":"disregard","distractors":["notice","emphasize","highlight"],"round":"62~60회","roundKey":"6260"},{"word":"susceptible","meaning":"a. 민감한, 영향을 받기 쉬운","eng":"Young children are often more susceptible to certain airborne viruses during the winter months.","kor":"어린아이들은 겨울철에 특정 공기 매개 바이러스에 더 영향을 받기 쉬운 경우가 많다.","correct":"vulnerable","distractors":["resistant","immune","protected"],"round":"62~60회","roundKey":"6260"},{"word":"tremendous","meaning":"a. 엄청난, 대단한","eng":"The new efficiency measures have led to a tremendous reduction in the factory’s annual energy costs.","kor":"새로운 효율성 조치들이 공장의 연간 에너지 비용을 엄청나게 줄여주었다.","correct":"immense","distractors":["tiny","insignificant","negligible"],"round":"62~60회","roundKey":"6260"}];

// Group by round
const ROUNDS_ORDER = ["99","9897","9694","9391","9089","8887","8685","8483","8281","8078","7775","7473","7271","7069","6867","6665","6463","6260"];
const ROUND_LABELS = {"99":"99회","9897":"98~97회","9694":"96~94회","9391":"93~91회","9089":"90~89회","8887":"88~87회","8685":"86~85회","8483":"84~83회","8281":"82~81회","8078":"80~78회","7775":"77~75회","7473":"74~73회","7271":"72~71회","7069":"70~69회","6867":"68~67회","6665":"66~65회","6463":"64~63회","6260":"62~60회"};

const roundCounts = {};
ALL_ITEMS.forEach(item => {
  roundCounts[item.roundKey] = (roundCounts[item.roundKey] || 0) + 1;
});

let selectedRounds = new Set();
let quizItems = [];
let currentIndex = 0;
let correctTotal = 0;
let wrongTotal = 0;
let wrongItems = [];

// Setup round grid
const roundGrid = document.getElementById('roundGrid');
ROUNDS_ORDER.forEach(rk => {
  const cnt = roundCounts[rk] || 0;
  if (cnt === 0) return;
  const btn = document.createElement('div');
  btn.className = 'round-btn';
  btn.dataset.round = rk;
  btn.innerHTML = ROUND_LABELS[rk] + '<br><span style="font-size:0.68rem;color:var(--text-dim)">' + cnt + '어</span>';
  btn.onclick = () => toggleRound(rk, btn);
  roundGrid.appendChild(btn);
});

function toggleRound(rk, btn) {
  if (selectedRounds.has(rk)) { selectedRounds.delete(rk); btn.classList.remove('active'); }
  else { selectedRounds.add(rk); btn.classList.add('active'); }
  updateMax();
}
function selectAllRounds() {
  document.querySelectorAll('.round-btn').forEach(b => { b.classList.add('active'); selectedRounds.add(b.dataset.round); });
  updateMax();
}
function deselectAllRounds() {
  document.querySelectorAll('.round-btn').forEach(b => { b.classList.remove('active'); });
  selectedRounds.clear();
  updateMax();
}
function updateMax() {
  const pool = ALL_ITEMS.filter(i => selectedRounds.has(i.roundKey));
  const max = pool.length;
  document.getElementById('countMax').textContent = '/ 최대 ' + max + '문제';
  document.getElementById('countInput').max = max;
  const inp = document.getElementById('countInput');
  if (parseInt(inp.value) > max) inp.value = max;
  document.getElementById('startBtn').disabled = max === 0;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const pool = ALL_ITEMS.filter(i => selectedRounds.has(i.roundKey));
  if (pool.length === 0) return;
  const count = Math.min(parseInt(document.getElementById('countInput').value) || 20, pool.length);
  quizItems = shuffle([...pool]).slice(0, count);
  currentIndex = 0;
  correctTotal = 0;
  wrongTotal = 0;
  wrongItems = [];

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('quizScreen').classList.add('fade-in');

  showQuestion();
}

function showQuestion() {
  const item = quizItems[currentIndex];
  const total = quizItems.length;

  document.getElementById('progressBar').style.width = ((currentIndex / total) * 100) + '%';
  document.getElementById('qCounter').textContent = (currentIndex + 1) + ' / ' + total;
  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;
  document.getElementById('roundTag').textContent = item.round;
  document.getElementById('qNumber').textContent = 'Q' + (currentIndex + 1);

  // Build sentence with underlined word
  const engText = item.eng;
  const word = item.word;
  // Find the word in sentence (case-insensitive, handle conjugations)
  let highlighted = engText;
  const regex = new RegExp('\\b(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:s|ed|ing|es|d|ly)?)\\b', 'gi');
  highlighted = highlighted.replace(regex, '<span class="underlined">$1</span>');
  // If no match found, try simpler approach
  if (!highlighted.includes('underlined')) {
    const simpleRegex = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    highlighted = highlighted.replace(simpleRegex, '<span class="underlined">$1</span>');
  }
  document.getElementById('sentence').innerHTML = highlighted;

  // Build 4 choices (1 correct + 3 distractors, shuffled)
  let options = [{ text: item.correct, isCorrect: true }];
  item.distractors.forEach(d => options.push({ text: d, isCorrect: false }));
  shuffle(options);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const nums = ['①', '②', '③', '④'];
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="num">' + nums[i] + '</span> ' + opt.text;
    btn.onclick = () => selectAnswer(btn, opt.isCorrect, item, options);
    choicesEl.appendChild(btn);
  });

  // Reset card
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('nextBtn').style.display = 'none';

  // Reset card height (card-front is position:relative, so card auto-sizes)
  document.getElementById('card').style.minHeight = '';
}

function selectAnswer(btn, isCorrect, item, options) {
  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  if (isCorrect) {
    btn.classList.add('selected-correct');
    correctTotal++;
  } else {
    btn.classList.add('selected-wrong');
    wrongTotal++;
    wrongItems.push({ ...item, userAnswer: btn.textContent.trim().substring(1).trim() });
    // Show correct answer
    document.querySelectorAll('.choice-btn').forEach((b, i) => {
      if (options[i].isCorrect) b.classList.add('show-correct');
    });
  }

  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;

  // Build back side
  const back = document.getElementById('cardBack');
  back.innerHTML = '';
  
  const icon = document.createElement('div');
  icon.className = 'result-icon';
  icon.textContent = isCorrect ? '🎉' : '😥';
  back.appendChild(icon);

  const label = document.createElement('div');
  label.className = 'result-label ' + (isCorrect ? 'correct' : 'wrong');
  label.textContent = isCorrect ? '정답!' : '오답';
  back.appendChild(label);

  const wordDiv = document.createElement('div');
  wordDiv.className = 'back-word';
  wordDiv.textContent = item.word;
  back.appendChild(wordDiv);

  const meaningDiv = document.createElement('div');
  meaningDiv.className = 'back-meaning';
  meaningDiv.textContent = item.meaning;
  back.appendChild(meaningDiv);

  const answerDiv = document.createElement('div');
  answerDiv.className = 'back-answer';
  answerDiv.innerHTML = '정답: <strong>' + item.correct + '</strong>';
  back.appendChild(answerDiv);

  const korDiv = document.createElement('div');
  korDiv.className = 'back-kor';
  korDiv.textContent = item.kor;
  back.appendChild(korDiv);

  // Flip card
  setTimeout(() => {
    const card = document.getElementById('card');
    const front = document.getElementById('cardFront');
    card.classList.add('flipped');
    // Set min-height to max of front and back so card doesn't collapse during flip
    requestAnimationFrame(() => {
      const backH = back.scrollHeight;
      const frontH = front.scrollHeight;
      card.style.minHeight = Math.max(backH, frontH) + 'px';
    });
  }, 400);

  // Show next button
  setTimeout(() => {
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = 
      (currentIndex + 1 >= quizItems.length) ? '결과 보기 →' : '다음 문제 →';
    // Scroll to make next button visible on mobile
    setTimeout(() => {
      nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }, 600);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= quizItems.length) {
    showResult();
    return;
  }
  showQuestion();
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('resultScreen').classList.add('fade-in');

  const total = quizItems.length;
  const pct = Math.round((correctTotal / total) * 100);

  document.getElementById('finalCorrect').textContent = correctTotal;
  document.getElementById('finalTotal').textContent = ' / ' + total;
  document.getElementById('finalPct').textContent = pct + '%';

  const pctEl = document.getElementById('finalPct');
  if (pct >= 90) { pctEl.style.color = 'var(--green)'; }
  else if (pct >= 70) { pctEl.style.color = 'var(--gold)'; }
  else { pctEl.style.color = 'var(--red)'; }

  let msg = '';
  if (pct === 100) msg = '완벽합니다! 🔥 모든 문제를 맞혔어요!';
  else if (pct >= 90) msg = '훌륭해요! 거의 완벽한 성적입니다.';
  else if (pct >= 80) msg = '좋은 실력이에요! 조금만 더 복습하면 완벽!';
  else if (pct >= 70) msg = '괜찮아요! 틀린 단어를 집중 복습해보세요.';
  else if (pct >= 50) msg = '절반 이상 맞혔어요! 오답 노트로 복습해보세요.';
  else msg = '아직 갈 길이 멀어요. 단어장을 다시 한번 살펴보세요!';
  document.getElementById('gradeMsg').textContent = msg;

  document.getElementById('btnReviewWrong').style.display = wrongItems.length > 0 ? 'inline-block' : 'none';
  document.getElementById('wrongReview').style.display = 'none';
}

function showWrongReview() {
  const wr = document.getElementById('wrongReview');
  if (wr.style.display === 'block') { wr.style.display = 'none'; return; }
  wr.style.display = 'block';
  wr.innerHTML = '<h3>오답 목록 (' + wrongItems.length + '개)</h3>';
  wrongItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'wrong-item';
    div.innerHTML = 
      '<div class="wi-word">' + item.word + '</div>' +
      '<div class="wi-meaning">' + item.meaning + '</div>' +
      '<div class="wi-eng">' + item.eng + '</div>' +
      '<div class="wi-kor">' + item.kor + '</div>' +
      '<div class="wi-answer"><span class="lbl-correct">정답: ' + item.correct + '</span> &nbsp; <span class="lbl-wrong">선택: ' + item.userAnswer + '</span></div>';
    wr.appendChild(div);
  });
}

function retryQuiz() {
  // Re-shuffle same settings
  currentIndex = 0;
  correctTotal = 0;
  wrongTotal = 0;
  wrongItems = [];
  shuffle(quizItems);
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion();
}

function goHome() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'block';
}

// Init
selectAllRounds();
</script>
